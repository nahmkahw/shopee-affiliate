name: Worklog

# บันทึกงานลง Google Sheet (per-PR + daily) + แจ้ง Discord เมื่อ PR merge เข้า master
# ดึง metadata จาก event payload ตรงๆ (ไม่ต้องเรียก API เพิ่ม)
# googleapis ติดตั้ง ad-hoc ในงานนี้ (ไม่ใส่ใน package.json — กัน test job ช้า)
on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: read

jobs:
  worklog:
    name: worklog
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install googleapis
        run: npm install googleapis --no-audit --no-fund --no-save
      - name: append worklog + notify Discord
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_COMMITS: ${{ github.event.pull_request.commits }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          CI_STATUS: success
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node lib/ci/worklog-runner.js
