<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9A3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="#fff" stroke-width="3"/>
  <!-- Jasmine flower petals -->
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(0,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(45,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(90,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(135,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(180,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(225,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(270,60,60)"/>
  <ellipse cx="60" cy="32" rx="7" ry="12" fill="white" opacity="0.9" transform="rotate(315,60,60)"/>
  <!-- Center -->
  <circle cx="60" cy="60" r="12" fill="#FFD700"/>
  <!-- Text -->
  <text x="60" y="100" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">มะลิ</text>
</svg>
